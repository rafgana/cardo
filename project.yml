name: IronRank
options:
  bundleIdPrefix: com.ironrank
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  IronRank:
    type: application
    platform: iOS
    sources:
      - Sources/IronRank
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ironrank.app
        INFOPLIST_FILE: Sources/IronRank/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: NO
    resources:
      - Sources/IronRank/Resources
