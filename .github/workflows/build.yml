name: Build IronRank

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate
        run: xcodegen generate 2>&1

      - name: List schemes
        run: xcodebuild -project IronRank.xcodeproj -list 2>&1

      - name: Build
        run: |
          xcodebuild build \
            -project IronRank.xcodeproj \
            -scheme IronRank \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            > build.log 2>&1
          echo "=== BUILD LOG (last 30 lines) ==="
          tail -30 build.log
          echo "=== END ==="

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Package .ipa
        if: success()
        run: |
          APP=$(find ./build -name "*.app" -type d | head -1)
          echo "App: $APP"
          mkdir -p Payload && cp -R "$APP" Payload/
          zip -r IronRank.ipa Payload/
          ls -lh IronRank.ipa

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: IronRank
          path: IronRank.ipa
