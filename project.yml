name: IronRank
options:
  bundleIdPrefix: com.ironrank
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1"

targets:
  IronRank:
    type: application
    platform: iOS
    sources:
      - path: Sources/IronRank
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ironrank.app
        INFOPLIST_FILE: Sources/IronRank/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    resources:
      - Sources/IronRank/Resources
