interface:
  display_name: "New Chat Ready"
  short_description: "生成可续接的交接包，可恢复丢失对话，并同步项目级 Markdown 记忆。"
  default_prompt: "Use $new-chat-ready to create a durable handoff document, preserve reusable project knowledge in Markdown when appropriate, and produce a paste-ready prompt for continuing this task in a fresh chat. If current context is missing or stale, recover relevant state from local Codex or Claude Code logs before summarizing."
policy:
  allow_implicit_invocation: true
