name: Build IronRank iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Simulator (unsigned)
        run: |
          xcodebuild build \
            -project IronRank.xcodeproj \
            -scheme IronRank \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ./build \
            2>&1

      - name: Package .app
        run: |
          echo "=== Contenido de build ==="
          find ./build -type d | head -40
          APP=$(find ./build -name "*.app" -type d | head -1)
          echo "APP: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/ 2>/dev/null || {
            echo "No se encontro .app, intentando busqueda amplia..."
            APP2=$(find ~/Library/Developer/Xcode/DerivedData -name "IronRank.app" -type d 2>/dev/null | head -1)
            echo "APP2: $APP2"
            cp -R "$APP2" Payload/
          }
          zip -r IronRank.ipa Payload/
          ls -lh IronRank.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IronRank
          path: IronRank.ipa
