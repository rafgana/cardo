name: Build IronRank iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show build settings
        run: |
          xcodebuild -project IronRank.xcodeproj -scheme IronRank -showBuildSettings 2>&1 | grep -E "BUILD_DIR|SYMROOT|OBJROOT|CONFIGURATION_BUILD_DIR|TARGET_BUILD_DIR" | head -20

      - name: Build app
        run: |
          xcodebuild build \
            -project IronRank.xcodeproj \
            -scheme IronRank \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | xcrun xcbeautify --renderer github-actions || true

      - name: Find and package .app
        run: |
          echo "=== Buscando .app en todo el sistema ==="
          find /Users -name "*.app" -type d 2>/dev/null | head -10
          find /tmp -name "*.app" -type d 2>/dev/null | head -10
          find /private -name "*.app" -type d 2>/dev/null | head -10
          APP=$(find /Users -name "IronRank.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            APP=$(find /private -name "IronRank.app" -type d 2>/dev/null | head -1)
          fi
          echo "App: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/ || echo "COPY FALLÓ"
          zip -r IronRank.ipa Payload/ || true
          ls -lh IronRank.ipa || true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IronRank
          path: IronRank.ipa
