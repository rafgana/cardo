name: IronRank CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Verify Swift files exist
        run: |
          echo "=== Swift files ==="
          find Sources -name "*.swift" | sort
          echo "=== Total ==="
          find Sources -name "*.swift" | wc -l
          echo "=== JSON resources ==="
          find Sources -name "*.json" | sort
