name: Build IronRank iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild build \
            -project IronRank.xcodeproj \
            -scheme IronRank \
            -configuration Release \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR=./output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | xcrun xcbeautify --renderer github-actions || true

      - name: Package IPA
        run: |
          echo "=== Buscando .app ==="
          find ./output -name "*.app" -type d
          APP=$(find ./output -name "*.app" -type d | head -1)
          echo "App: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r IronRank.ipa Payload/
          ls -lh IronRank.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: IronRank
          path: IronRank.ipa
