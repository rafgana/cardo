name: Build IronRank

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen && xcodegen generate
      - run: |
          xcodebuild -project IronRank.xcodeproj -scheme IronRank -configuration Debug -sdk iphoneos -derivedDataPath ./build CODE_SIGNING_ALLOWED=NO 2>&1
          exit_code=$?
          echo "XCODEBUILD_EXIT_CODE=$exit_code"
          exit $exit_code
      - run: |
          APP=$(find ./build -name "*.app" -type d | head -1)
          [ -z "$APP" ] && APP=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -1)
          mkdir -p Payload && cp -R "$APP" Payload/ && zip -r IronRank.ipa Payload/
        if: success()
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: IronRank
          path: IronRank.ipa
