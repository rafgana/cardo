name: Build IronRank iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild \
            -project IronRank.xcodeproj \
            -scheme IronRank \
            -configuration Release \
            -derivedDataPath ./build \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcrun xcbeautify

      - name: Debug build output
        run: find ./build -type d | head -30

      - name: Package .ipa
        run: |
          APP_PATH=$(find ./build -name "*.app" -type d | head -1)
          echo "App found at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "Buscando en rutas alternativas..."
            APP_PATH=$(find /Users -name "IronRank.app" -type d 2>/dev/null | head -1)
            echo "Alternative: $APP_PATH"
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r IronRank.ipa Payload/
          ls -lh IronRank.ipa

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: IronRank
          path: IronRank.ipa
